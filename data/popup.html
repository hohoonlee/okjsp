<!doctype html>
<html>
	<head>
		<title>Getting Started Extension's Popup</title>
		<style>
			body {
				font-family: "Segoe UI", "Lucida Grande", Tahoma, sans-serif;
				font-size: 80%;
			}
			#list {
				text-overflow: ellipsis;
				overflow: hidden;
				max-width: 200px;
			}
			ul {
				list-style-type: none;
				margin: 0;
				padding: 0;
			}

			li {
				font: 200 12px/1.5 Helvetica, Verdana, sans-serif;
				border-bottom: 1px solid #ccc;
			}

			li:last-child {
				border: none;
			}

			li {
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			li .name {
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
				flex: 1;
			}

			.del-btn {
				background: none;
				border: none;
				color: #c00;
				cursor: pointer;
				font-weight: bold;
				padding: 0 4px;
				margin-left: 4px;
				font-size: 12px;
			}

			.del-btn:hover {
				color: #f00;
			}

			div {
				font: 200 12px/1.5 Helvetica, Verdana, sans-serif;
				width: 200px;
			}
		</style>
		<script src="../lib/jquery/jquery.js"></script>
		<script src="popup.js"></script>
	</head>
	<body>
		<div>
			<input type="radio" name="hideType" id="hidden" value="hidden"><label for="hidden">hidden</label>
			<input type="radio" name="hideType" id="italics" value="italics"><label for="italics">italics</label>
		</div>
		<ul id="list"></ul>
	</body>
</html>
